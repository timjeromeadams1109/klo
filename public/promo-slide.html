<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>KLO Conference — Scan to Join</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0a0e1a 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Accent glow */
  body::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(39,100,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(33,184,205,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .container {
    display: flex;
    align-items: center;
    gap: 120px;
    position: relative;
    z-index: 1;
  }
  .left {
    text-align: left;
    max-width: 800px;
  }
  .logo-text {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #2764FF;
    margin-bottom: 24px;
  }
  .tagline {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 28px;
    color: #94a3b8;
    line-height: 1.5;
    margin-bottom: 40px;
  }
  .url {
    font-size: 22px;
    color: #64748b;
    font-family: monospace;
    letter-spacing: 1px;
  }
  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .qr-box {
    background: #fff;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 0 60px rgba(39,100,255,0.2), 0 0 120px rgba(33,184,205,0.1);
  }
  .qr-box img { display: block; width: 320px; height: 320px; }
  .scan-text {
    font-size: 26px;
    font-weight: 600;
    color: #e2e8f0;
    text-align: center;
  }
  .scan-arrow {
    font-size: 40px;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  /* Gradient bar at bottom */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #2764FF, #21B8CD, #2764FF);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="logo-text">Keith L. Odom</div>
      <div class="tagline">Join the<br>Conversation</div>
      <div class="subtitle">
        Scan the QR code to ask questions,<br>
        vote on topics, and engage live.
      </div>
      <div class="url">klo-app.vercel.app/conference</div>
    </div>
    <div class="right">
      <div class="scan-arrow">👆</div>
      <div class="qr-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=https%3A%2F%2Fklo-app.vercel.app%2Fconference&bgcolor=ffffff&color=111827" alt="QR Code" />
      </div>
      <div class="scan-text">Scan to Join</div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</body>
</html>
