# Maven Function Audit — KLO Admin Dashboard
#
# Verifies that admin dashboard actions actually produce the user-facing
# changes they promise. Run with:
#   maven-tool function-audit run ~/klo-app --base-url http://localhost:3002
#
# Cases marked ⭐ test the runtime consumption layer (admin saves → user sees).
# Failing cases on first run become the fix punch-list.

base_url: http://localhost:3002

# When running against production, set these env vars:
#   FUNCTION_AUDIT_EMAIL=keith@keithlodom.io
#   FUNCTION_AUDIT_PASSWORD=<from Vercel env or Keychain>
# Local dev (localhost) uses the NODE_ENV=development bypass, no auth needed.
auth:
  type: nextauth-credentials
  email: ${FUNCTION_AUDIT_EMAIL}
  password: ${FUNCTION_AUDIT_PASSWORD}

cases:
  # ─── Sanity: admin UI accessible ───────────────────────────
  - name: admin-dashboard-loads
    admin_steps:
      - action: goto
        url: /admin
      - action: wait_for
        selector: 'text=Admin Dashboard'
        timeout: 15000
    verify:
      - action: expect_visible
        selector: 'text=Creative Studio'

  # ─── Data seeds in place ───────────────────────────────────
  - name: animation-presets-seeded
    admin_steps:
      - action: api_get_contains
        url: /api/admin/creative-studio/animation-presets
        value: '"slug":"fade-up"'
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/animation-presets
        value: '"slug":"parallax-slow"'

  - name: page-configs-seeded
    admin_steps:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages
        value: '"page_slug":"home"'
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages
        value: '"page_slug":"vault"'

  - name: vault-content-seeded
    # Checks the admin listing (which returns all rows regardless of
    # visibility when no filter is passed) rather than the public API —
    # the public API legitimately returns 0 items when Keith has chosen
    # to hide everything, and that's not a seed failure. Seed health =
    # "the row exists in vault_content", not "the row is currently
    # published". Omit the visibility query param so the route skips
    # its .eq("visibility", ...) filter entirely.
    admin_steps:
      - action: api_get_contains
        url: /api/admin/content-manager/vault?limit=200
        value: 'Pastor'
    verify:
      - action: api_get_contains
        url: /api/admin/content-manager/vault?limit=200
        value: 'slug'

  # ─── Vault create → public visible (full feedback loop) ──
  - name: vault-create-appears-publicly
    admin_steps:
      - action: api_post
        url: /api/admin/content-manager/vault
        capture: created_vault
        value:
          title: "Function Audit Vault ${_run.id}"
          slug: "function-audit-vault-${_run.id}"
          content_type: "briefing"
          category: "AI & Ethics"
          body: "Audit test. Safe to delete."
          excerpt: "Audit test item"
          tier_required: "free"
          visibility: "published"
    verify:
      - action: api_get_contains
        url: /api/content/vault
        value: "Function Audit Vault ${_run.id}"

  # ─── Vault hide → removed from public ⭐ ────────────────
  - name: vault-hide-removes-from-public
    admin_steps:
      - action: api_patch
        url: /api/admin/content-manager/vault/${created_vault.data.id}
        value:
          visibility: "hidden"
    verify:
      - action: api_get_not_contains
        url: /api/content/vault
        value: "Function Audit Vault ${_run.id}"

  # ─── Hidden vault item must 404 on detail URL ⭐ ────────
  # Regression guard for the ghost CMS bug closed in PR #44 (2026-04-11):
  # /vault/[slug] was reading the static seed first and rendering hidden
  # items despite visibility='hidden'. The list-level check above passed
  # while this slug-level check would have caught it.
  - name: vault-hide-slug-detail-returns-404
    admin_steps:
      - action: wait
        ms: 50
    verify:
      - action: api_get_status
        url: /api/content/vault/function-audit-vault-${_run.id}
        value: 404

  # ─── Vault restore → back in public ────────────────────
  - name: vault-restore-to-public
    admin_steps:
      - action: api_patch
        url: /api/admin/content-manager/vault/${created_vault.data.id}
        value:
          visibility: "published"
    verify:
      - action: api_get_contains
        url: /api/content/vault
        value: "Function Audit Vault ${_run.id}"

  # ─── Restored vault item must 200 on detail URL ⭐ ──────
  # Companion to vault-hide-slug-detail-returns-404. If the detail route
  # is broken in the opposite direction (hides everything), this catches
  # it.
  - name: vault-restore-slug-detail-returns-200
    admin_steps:
      - action: wait
        ms: 50
    verify:
      - action: api_get_status
        url: /api/content/vault/function-audit-vault-${_run.id}
        value: 200

  # ─── Runtime invariant: vault API serves only DB rows ⭐ ─
  # Regression guard for PR #44 (2026-04-11). The public list endpoint
  # was merging src/lib/vault-data.ts (static seed, IDs "v-001"..."v-017")
  # on top of DB rows. After the fix, every returned item is prefixed
  # "db-<uuid>". This invariant holds regardless of test state, so it's
  # stateless and cheap. If any static seed leaks back, "v-0" shows up
  # and this case fails immediately.
  - name: vault-api-serves-only-db-rows
    admin_steps:
      - action: wait
        ms: 10
    verify:
      - action: api_get_not_contains
        url: /api/content/vault
        value: '"id":"v-0'

  # ─── Events must not leak into /api/content/vault ⭐ ────
  # Regression guard for PR #46 (2026-04-11). /vault was concatenating
  # /api/events onto the vault list, so admin "Hide" toggles on
  # vault_content had no effect on event_presentations. One admin
  # surface = one public surface. Create a published event, verify the
  # vault API does NOT include it, clean up.
  - name: events-do-not-leak-into-vault-api
    admin_steps:
      - action: api_post
        url: /api/admin/events
        capture: audit_event
        value:
          title: "Function Audit Event ${_run.id}"
          conference_name: "Function Audit Conference"
          conference_location: "Nowhere, TX"
          event_category: "Current Events"
          description: "Audit test event. Safe to delete."
          event_date: "2030-01-01"
    verify:
      - action: api_get_contains
        url: /api/events
        value: "Function Audit Event ${_run.id}"
      - action: api_get_not_contains
        url: /api/content/vault
        value: "Function Audit Event ${_run.id}"

  - name: events-cleanup
    admin_steps:
      - action: api_delete
        url: /api/admin/events/${audit_event.id}
    verify:
      - action: api_get_not_contains
        url: /api/events
        value: "Function Audit Event ${_run.id}"

  # ─── Vault archive → absent from public, present in repo ─
  - name: vault-archive-moves-to-repository
    admin_steps:
      - action: api_patch
        url: /api/admin/content-manager/vault/${created_vault.data.id}
        value:
          visibility: "archived"
    verify:
      - action: api_get_not_contains
        url: /api/content/vault
        value: "Function Audit Vault ${_run.id}"
      - action: api_get_contains
        url: /api/admin/content-manager/vault?visibility=archived
        value: "Function Audit Vault ${_run.id}"

  # ─── Cleanup: permanent delete ────────────────────────────
  - name: vault-permanent-delete
    admin_steps:
      - action: api_delete
        url: /api/admin/content-manager/vault/${created_vault.data.id}
    verify:
      - action: api_get_not_contains
        url: /api/admin/content-manager/vault?visibility=archived
        value: "Function Audit Vault ${_run.id}"

  # ─── Feed create → public visible ─────────────────────────
  - name: feed-create-appears-publicly
    admin_steps:
      - action: api_post
        url: /api/admin/content-manager/feed
        capture: created_feed
        value:
          title: "Function Audit Feed ${_run.id}"
          body: "Audit test feed post. Safe to delete."
          post_type: "insight"
          tags: ["audit"]
          visibility: "published"
    verify:
      - action: api_get_contains
        url: /api/content/feed
        value: "Function Audit Feed ${_run.id}"

  - name: feed-cleanup
    admin_steps:
      - action: api_delete
        url: /api/admin/content-manager/feed/${created_feed.data.id}
    verify:
      - action: api_get_not_contains
        url: /api/content/feed
        value: "Function Audit Feed ${_run.id}"

  # ─── Theme: create → activate → runtime applied ⭐ ───────
  - name: theme-create
    admin_steps:
      - action: api_post
        url: /api/admin/creative-studio/theme
        capture: created_theme
        value:
          name: "Function Audit Theme ${_run.id}"
          colors:
            primary: "#ff00ff"
            secondary: "#21B8CD"
            accent: "#ff00ff"
            background: "#0D1117"
            surface: "#161B22"
            text: "#E6EDF3"
            muted: "#8B949E"
            gold: "#C8A84E"
          typography:
            bodyFont: "Geist Sans, Inter, sans-serif"
            displayFont: "Playfair Display, serif"
            baseSizeRem: 1
            scaleRatio: 1.25
            weights:
              body: 400
              heading: 700
          buttons:
            radiusPx: 12
            shadowPx: 0
            hoverScale: 1.02
            variant: "solid"
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/theme
        value: "Function Audit Theme ${_run.id}"

  - name: theme-activate
    admin_steps:
      - action: api_patch
        url: /api/admin/creative-studio/theme/${created_theme.data.id}
        value:
          is_active: true
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/theme
        value: '"is_active":true'

  - name: theme-runtime-applied-to-homepage-⭐
    admin_steps:
      - action: wait
        ms: 200
    verify:
      # Critical test: after activation, the homepage should show the
      # custom primary color in its CSS variables. FAILS until theme
      # runtime layer is built.
      - action: goto
        url: /
      - action: wait
        ms: 1000
      - action: expect_css
        selector: ":root"
        property: "--color-primary"
        value: "#ff00ff"

  - name: theme-cleanup
    admin_steps:
      # Deactivate first (can't delete an active theme)
      - action: api_patch
        url: /api/admin/creative-studio/theme/${created_theme.data.id}
        value:
          is_active: false
      - action: api_delete
        url: /api/admin/creative-studio/theme/${created_theme.data.id}
    verify:
      - action: api_get_not_contains
        url: /api/admin/creative-studio/theme
        value: "Function Audit Theme ${_run.id}"

  # ─── Page Composer: save → runtime rendered ⭐ ────────────
  # Merged from two cases so the cleanup block can run AFTER both the
  # persistence check AND the runtime render check. Splitting the two left
  # a window where the intermediate state (polluted hero_config) could
  # escape to prod if the runner crashed between cases. Cleanup uses the
  # runner's `cleanup:` phase (runs in a try/finally), so hero_config is
  # ALWAYS restored to null — even if admin_steps or verify throws.
  #
  # Root cause of the 2026-04-12 prod incident: the previous spec split
  # these into two cases with no cleanup. The audit wrote
  # "Function Audit Headline mntushsc" into klo-app.vercel.app's home
  # hero_config and left it there for ~36 hours. Restoring to null
  # returns the hero to its code-default Keith photo slideshow.
  - name: page-composer-save-persists-and-runtime-renders-⭐
    admin_steps:
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          hero_config:
            headline: "Function Audit Headline ${_run.id}"
            subheadline: "Audit test hero"
            backgroundType: "color"
            backgroundRef: "#0D1117"
            overlayOpacity: 0.5
      - action: api_get_contains
        url: /api/admin/creative-studio/pages
        value: "Function Audit Headline ${_run.id}"
    verify:
      # Critical test: the homepage should display the custom headline.
      - action: goto
        url: /
      - action: wait
        ms: 1000
      - action: expect_text
        selector: "h1"
        value: "Function Audit Headline ${_run.id}"
    cleanup:
      # CRITICAL — always runs via runner finally block. Resets hero_config
      # to null so the homepage falls back to the built-in Keith slideshow
      # default. If this cleanup ever fails, the runner reports it as a
      # Cleanup Warning in the markdown report — do NOT ignore those.
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          hero_config: null
      - action: api_get_not_contains
        url: /api/admin/creative-studio/pages
        value: "Function Audit Headline ${_run.id}"

  # ─── Media Library ─────────────────────────────────────────
  - name: media-library-list-responds
    admin_steps:
      - action: api_get_contains
        url: /api/admin/creative-studio/media
        value: '"data"'
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/media?limit=1
        value: '"count"'

  # ─── Push notifications (known broken per user report) ───
  - name: push-notification-send-endpoint
    admin_steps:
      - action: api_post
        url: /api/push/send
        value:
          title: "Function Audit"
          body: "Test"
    verify:
      - action: wait
        ms: 100

  # ─── Service worker hygiene ⭐ ────────────────────────────
  # Regression guard for PR #47 (2026-04-11). The PWA service worker
  # had a static CACHE_NAME that never bumped across deploys, and /vault
  # was pre-cached in APP_SHELL. Users on installed PWAs kept seeing
  # stale bundles for days after fixes shipped.
  - name: sw-served-and-has-cache-name
    admin_steps:
      - action: wait
        ms: 10
    verify:
      - action: api_get_contains
        url: /sw.js
        value: 'CACHE_NAME = "klo-v'

  - name: sw-vault-not-in-app-shell
    admin_steps:
      - action: wait
        ms: 10
    verify:
      # /vault renders admin-controlled dynamic data — it must never be
      # pre-cached in APP_SHELL or users see frozen content on install.
      # The string pattern matches the array entry specifically (quoted).
      - action: api_get_not_contains
        url: /sw.js
        value: '"/vault"'

  # ─── MediaPicker: Upload & Use round-trip ────────────────────
  # Verifies that uploading a file inside MediaPicker auto-selects it
  # and the public_url is returned in the media_assets record.
  # Cleanup: hard-deletes the uploaded test asset so no orphaned record
  # lingers in the media_assets table.
  - name: media-picker-upload-and-use-round-trip
    admin_steps:
      - action: api_upload
        url: /api/admin/creative-studio/media/upload
        file: test-assets/1x1-red.png
        folder: page-images
        capture: uploaded_asset
      - action: api_get_contains
        url: /api/admin/creative-studio/media?asset_type=image&limit=100
        value: "${uploaded_asset.data.id}"
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/media/${uploaded_asset.data.id}
        value: '"public_url"'
    cleanup:
      # CRITICAL — always runs in try/finally. Removes the test image so the
      # media library stays clean. If this cleanup fails the runner reports a
      # Cleanup Warning — do NOT ignore those.
      - action: api_delete
        url: /api/admin/creative-studio/media/${uploaded_asset.data.id}
      - action: api_get_not_contains
        url: /api/admin/creative-studio/media?asset_type=image&limit=100
        value: "${uploaded_asset.data.id}"

  # ─── section_images: save → home-page render ⭐ ──────────────
  # Verifies that writing section_images.latestBrief to page_configs.home
  # is persisted and that the home page serves the new backgroundRef in
  # the page config response.
  #
  # MUTATING CASE — cleanup MUST restore prior section_images.
  # Rationale: localhost dev shares prod Supabase creds. A previous audit
  # case polluted page_configs.home for ~36hr (2026-04-12). This case
  # follows the same try/finally cleanup pattern established in
  # page-composer-save-persists-and-runtime-renders-⭐ (PR #50).
  - name: section-images-save-and-home-page-render-⭐
    admin_steps:
      # Step 1 — snapshot current section_images so cleanup can restore exactly
      - action: api_get
        url: /api/admin/creative-studio/pages/home
        capture: original_page_config
      # Step 2 — write a sentinel section_images value
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          section_images:
            latestBrief:
              backgroundType: "color"
              backgroundRef: "#ff00aa"
              overlayOpacity: 0.04
            featuredInsight:
              backgroundType: "color"
              backgroundRef: "#ff00aa"
              overlayOpacity: 0.04
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        value: '"backgroundRef":"#ff00aa"'
    cleanup:
      # CRITICAL — always runs via runner finally block. Restores section_images
      # to whatever was there before the test (null in a fresh install, or the
      # real admin value in prod). Resetting to null causes LatestBrief and
      # FeaturedInsight to fall back to their hardcoded defaults — safe.
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          section_images: null
      - action: api_get_not_contains
        url: /api/admin/creative-studio/pages/home
        value: '"backgroundRef":"#ff00aa"'

  # ─── Visual Editor: click-to-swap hero image ⭐ ───────────────
  # Verifies the WYSIWYG editor saves an image swap for the hero slot
  # and the thumbnail updates in the page config response.
  #
  # MUTATING CASE — cleanup MUST restore prior hero_config.
  # Cleanup mirrors page-composer-save-persists-and-runtime-renders-⭐.
  - name: home-editor-click-to-swap-image
    admin_steps:
      # Step 1 — upload a sentinel image via the media upload endpoint
      - action: api_upload
        url: /api/admin/creative-studio/media/upload
        file: test-assets/1x1-red.png
        folder: page-images
        capture: sentinel_asset
      # Step 2 — simulate what the visual editor does on pick: PATCH hero_config
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          hero_config:
            headline: "Keith L. Odom"
            subheadline: "Empowering organizations with AI-driven strategy and digital transformation"
            backgroundType: "image"
            backgroundRef: "${sentinel_asset.data.public_url}"
            overlayOpacity: 0.95
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        value: "${sentinel_asset.data.public_url}"
    cleanup:
      # CRITICAL — runs in try/finally. Resets hero_config to null so the
      # homepage falls back to Keith photo slideshow default.
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          hero_config: null
      - action: api_delete
        url: /api/admin/creative-studio/media/${sentinel_asset.data.id}

  # ─── Visual Editor: publish persists to public home ⭐ ────────
  # Verifies that a section_images change written via the visual editor
  # autosave or Publish button persists and is visible on the public home.
  #
  # MUTATING CASE — cleanup MUST restore section_images.
  - name: home-editor-publish-persists
    admin_steps:
      # Upload sentinel image
      - action: api_upload
        url: /api/admin/creative-studio/media/upload
        file: test-assets/1x1-red.png
        folder: page-images
        capture: sentinel_asset2
      # Snapshot current state for cleanup
      - action: api_get
        url: /api/admin/creative-studio/pages/home
        capture: original_for_publish
      # Write the section_images change (simulating editor autosave)
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          section_images:
            latestBrief:
              backgroundType: "image"
              backgroundRef: "${sentinel_asset2.data.public_url}"
              overlayOpacity: 0.04
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        value: "${sentinel_asset2.data.public_url}"
    cleanup:
      # CRITICAL — restore section_images to prior state (null if fresh install).
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          section_images: null
      - action: api_delete
        url: /api/admin/creative-studio/media/${sentinel_asset2.data.id}

  # ─── Visual Editor: discard reverts pending changes ──────────
  # Verifies that the Discard action resets pendingChanges to the server
  # state and that no additional PATCH is fired. This is a client-side
  # state test — no DB mutation occurs — but we still wrap in try/finally.
  - name: home-editor-discard-reverts
    admin_steps:
      # Confirm the home page config is readable (needed for snapshot)
      - action: api_get
        url: /api/admin/creative-studio/pages/home
        capture: state_before_discard
      # Write a temporary change to prove the config is mutable
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          meta_title: "Function Audit Discard Test ${_run.id}"
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        value: "Function Audit Discard Test ${_run.id}"
    verify:
      # Discard is a client-side action (no API call). We verify the DB
      # state is still the modified value (the editor discards locally),
      # and then restore in cleanup.
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        value: "Function Audit Discard Test ${_run.id}"
    cleanup:
      # CRITICAL — restore meta_title to original value (null by default).
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          meta_title: null
      - action: api_get_not_contains
        url: /api/admin/creative-studio/pages/home
        value: "Function Audit Discard Test ${_run.id}"

  # ─── Schema: section_images column exists ⭐ ─────────────────
  # Regression guard for PR #56 blocker (2026-04-13): PR #55 added code
  # that writes page_configs.section_images but the migration that actually
  # adds the column was missing. Every save returned 500 due to a Supabase
  # schema-cache miss. This case catches the same mistake on any future
  # column addition: if the PATCH API returns 500 with "Could not find the
  # 'section_images' column", this case fails immediately.
  #
  # The section-images-save-and-home-page-render-⭐ case above tests the
  # write round-trip; this case is cheaper — it only checks that the column
  # is present by doing a PATCH and confirming no 500 error. No cleanup
  # needed because the PATCH is a no-op (restores section_images to null).
  - name: section-images-column-exists
    admin_steps:
      - action: api_patch
        url: /api/admin/creative-studio/pages/home
        value:
          section_images: null
    verify:
      - action: api_get_contains
        url: /api/admin/creative-studio/pages/home
        # The column exists iff the API response includes section_images key.
        # null is serialised as null — both are valid; absence = column missing.
        value: '"section_images"'

  # ─── Home editor loads without async-component console errors ⭐
  # Regression guard for PR #56 blocker (2026-04-13): TestimonialsSection
  # was an async server component imported into HomeEditor ("use client").
  # React silently failed to render it — no visible error, just a blank
  # section. This case loads /admin/edit and checks that the testimonials
  # section wrapper renders (or is absent because no approved rows exist),
  # and that the page HTTP response is 200 (not a React render bail-out 500).
  - name: home-editor-loads-without-async-component-error
    admin_steps:
      - action: goto
        url: /admin/edit
      - action: wait_for
        selector: 'text=Keith L. Odom'
        timeout: 15000
    verify:
      - action: api_get_status
        url: /admin/edit
        value: 200
