name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: 'This issue has been inactive for 30 days and will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This PR has been inactive for 14 days and will be closed in 7 days if no further activity occurs.'
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-close: 7
